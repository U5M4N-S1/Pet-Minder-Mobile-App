<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPal – My Bookings</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Caveat:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="../css/bookings.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
</head>
<body>

<!-- NAV -->
<nav class="app-nav" id="app-nav">
  <div class="nav-logo" onclick="window.location.href='home.html'"><span>🐾</span> <span class="logo-paw">Paw</span><span class="logo-pal">Pal</span></div>
  <div class="nav-links">
    <button class="nav-link" id="nav-home" onclick="window.location.href='home.html'">🏠 Home</button>
    <button class="nav-link" id="nav-search" onclick="goToSearch()">🔍 Find Minders</button>
    <button class="nav-link active" id="nav-bookings" onclick="window.location.href='bookings.html'">📅 Bookings</button>
    <button class="nav-link" id="nav-messages" onclick="window.location.href='messages.html'">💬 Messages</button>
    <button class="nav-link" id="nav-profile" onclick="window.location.href='profile.html'">👤 Profile</button>
  </div>
</nav>
<div class="mobile-header" id="mobile-header"><span class="mobile-header-paw">🐾</span><span class="logo-paw">Paw</span><span class="logo-pal">Pal</span></div>

<!-- BOOKINGS -->
<div class="screen active" id="screen-bookings">
  <div class="page-content">
    <!-- Main bookings view (tabs + lists) -->
    <div id="bookings-main-section">
      <div style="padding:24px 24px 0"><h1 style="font-family:'Playfair Display',serif;font-size:26px;color:var(--bark);margin-bottom:16px">My Bookings</h1><div class="auth-tabs" id="bookings-tabs-row" style="max-width:420px"><button class="auth-tab active" id="bookings-tab-upcoming" onclick="switchBookingTab(this,'upcoming')">Upcoming</button><button class="auth-tab" id="bookings-tab-past" onclick="switchBookingTab(this,'past')">Past</button><button class="auth-tab" id="bookings-tab-requests" style="display:none" onclick="switchBookingTab(this,'requests')">Requests</button></div></div>
      <div style="padding:20px 24px" id="bookings-upcoming"><div class="booking-list" id="bookings-upcoming-list"></div></div>
      <div style="padding:20px 24px;display:none" id="bookings-past"><div class="booking-list" id="bookings-past-list"></div></div>
      <div style="padding:20px 24px;display:none" id="bookings-requests"><div class="booking-list" id="bookings-requests-list"></div></div>
    </div>
    <!-- Booking detail view (shown when a card is clicked) -->
    <div id="bookings-detail-section" style="display:none;padding:24px">
      <button class="back-btn" style="position:static;background:var(--sand-light);color:var(--bark);margin-bottom:16px" onclick="closeBookingDetail()">←</button>
      <h1 style="font-family:'Playfair Display',serif;font-size:22px;color:var(--bark);margin-bottom:6px">Booking Details</h1>
      <p style="font-size:13px;color:var(--bark-light);margin-bottom:20px">View your booking information</p>
      <div id="booking-detail-content"></div>
    </div>
  </div>
  <nav class="bottom-nav"><button class="bottom-nav-item" onclick="window.location.href='home.html'"><span>🏠</span><span>Home</span></button><button class="bottom-nav-item" onclick="goToSearch()"><span>🔍</span><span>Search</span></button><button class="bottom-nav-item active" onclick="window.location.href='bookings.html'"><span>📅</span><span>Bookings</span></button><button class="bottom-nav-item" onclick="window.location.href='messages.html'"><span>💬</span><span>Messages</span></button><button class="bottom-nav-item" onclick="window.location.href='profile.html'"><span>👤</span><span>Profile</span></button></nav>
</div>

<div class="toast" id="toast"></div>

<!-- REPORT USER MODAL (shared) -->
<div class="report-modal-overlay" id="report-modal" onclick="if(event.target===this)closeReportModal()">
  <div class="report-modal">
    <div class="report-modal-header">
      <h3 id="report-modal-title">🚩 Report User</h3>
      <button class="report-modal-close" onclick="closeReportModal()" aria-label="Close">×</button>
    </div>
    <p class="report-modal-target" id="report-modal-target">Reporting: —</p>
    <div class="field-group"><label>Category</label><select id="report-modal-category">
      <option>Inappropriate behaviour</option>
      <option>Harassment or abuse</option>
      <option>Scam or fraud</option>
      <option>Unsafe pet care</option>
      <option>No-show / missed booking</option>
      <option>Other</option>
    </select></div>
    <div class="field-group"><label>What happened?</label><textarea id="report-modal-reason" placeholder="Please describe the issue in detail..." rows="5"></textarea></div>
    <div class="report-modal-actions">
      <button class="btn-outline" onclick="closeReportModal()">Cancel</button>
      <button class="btn-primary" onclick="submitReportModal()">Submit Report</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-modal-overlay" id="confirm-modal" onclick="if(event.target===this)closeConfirmModal()"><div class="confirm-modal"><div class="confirm-modal-icon" id="confirm-modal-icon">⚠️</div><h3 id="confirm-modal-title">Are you sure?</h3><p id="confirm-modal-message">This action cannot be undone.</p><div class="confirm-modal-actions"><button class="btn-outline" style="color:var(--bark-light);border-color:var(--sand);flex:1;padding:12px" onclick="closeConfirmModal()">Cancel</button><button class="btn-primary" style="flex:1;padding:12px" id="confirm-modal-btn">Confirm</button></div></div></div>

<!-- LIVE TRACKING MODAL -->
<div id="tracking-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.55);align-items:flex-end;justify-content:center">
  <div style="background:var(--warm-white);border-radius:24px 24px 0 0;width:100%;max-width:520px;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:18px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sand-light)">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--bark)">📍 Live Location</div>
        <div id="tracking-status" style="font-size:12px;color:var(--bark-light);margin-top:3px">Connecting…</div>
      </div>
      <button onclick="closeLiveTracking()" style="background:var(--sand-light);border:none;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--bark);line-height:1">×</button>
    </div>
    <div id="tracking-map" style="width:100%;height:360px"></div>
    <div style="padding:12px 20px 22px;font-size:12px;color:var(--bark-light);text-align:center">Updates every 5 seconds · <a href="https://www.openstreetmap.org" target="_blank" style="color:var(--terra)">© OpenStreetMap</a></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="../app.js"></script>
<script>
(async () => {
  try {
    // Pull bookings from BOTH perspectives so a minder sees both the
    // bookings they placed as an owner and the ones they received as a
    // minder (recipient cards are tagged for the orange/yellow style).
    const bookings = await loadAllBookingsForUser();
    allBookingsCache = bookings;
    renderBookingCards('bookings-upcoming-list', filterUpcoming(bookings));
    renderBookingCards('bookings-past-list',     filterPast(bookings));
  } catch {
    renderBookingCards('bookings-upcoming-list', upcomingBookings);
    renderBookingCards('bookings-past-list',     pastBookings);
  }

  // If the logged-in user is a minder, also pre-load their pending
  // requests tab so switching to it is instant and the pending count is
  // correct from the moment the page renders.
  const _bRoles = Array.isArray(userProfile.role) ? userProfile.role : [userProfile.role || 'owner'];
  if (_bRoles.includes('minder')) loadBookingRequests();

  // Show Requests tab for minders
  if (_bRoles.includes('minder')) {
    const reqTab = document.getElementById('bookings-tab-requests');
    if (reqTab) reqTab.style.display = '';
  }

  // If linked from notifications (?tab=requests), switch to that tab
  const params = new URLSearchParams(window.location.search);
  if (params.get('tab') === 'requests') {
    const reqTab = document.getElementById('bookings-tab-requests');
    if (reqTab) { reqTab.style.display = ''; switchBookingTab(reqTab, 'requests'); }
  }
})();
</script>
</body>
</html>
