<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPal – Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Caveat:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/messages.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<!-- NAV -->
<nav class="app-nav" id="app-nav">
  <div class="nav-logo" onclick="window.location.href='home.html'"><span>🐾</span> <span class="logo-paw">Paw</span><span class="logo-pal">Pal</span></div>
  <div class="nav-links">
    <button class="nav-link" id="nav-home" onclick="window.location.href='home.html'">🏠 Home</button>
    <button class="nav-link" id="nav-search" onclick="goToSearch()">🔍 Find Minders</button>
    <button class="nav-link" id="nav-bookings" onclick="window.location.href='bookings.html'">📅 Bookings</button>
    <button class="nav-link active" id="nav-messages" onclick="window.location.href='messages.html'">💬 Messages</button>
    <button class="nav-link" id="nav-profile" onclick="window.location.href='profile.html'">👤 Profile</button>
  </div>
</nav>
<div class="mobile-header" id="mobile-header"><span class="mobile-header-paw">🐾</span><span class="logo-paw">Paw</span><span class="logo-pal">Pal</span></div>

<!-- MESSAGES -->
<div class="screen active" id="screen-messages">
  <div class="messages-container" id="messages-container">
    <div class="messages-sidebar">
      <div class="messages-sidebar-header"><h2>Messages</h2></div>
      <div class="chat-list" id="chat-list">
        <div style="padding:24px;text-align:center;color:var(--bark-light);font-size:13px">Loading chats…</div>
      </div>
    </div>
    <div class="messages-main" id="messages-main">
      <div class="messages-empty" id="chat-empty-state">
        <div class="messages-empty-icon">💬</div>
        <div class="messages-empty-text">Select a chat to start messaging</div>
        <div class="messages-empty-sub">Choose from your conversations on the left</div>
      </div>
      <div id="chat-active-area" style="display:none;flex-direction:column;flex:1">
        <div class="chat-header-bar">
          <button class="chat-back-btn" onclick="closeMobileChat()">←</button>
          <div class="chat-avatar" style="width:38px;height:38px;font-size:18px" id="chat-active-avatar">🧑</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:15px" id="chat-active-name">Chat</div>
            <div class="chat-active-status" id="chat-active-status">● Online</div>
          </div>
          <button class="chat-report-btn" onclick="openReportFromChat()" aria-label="Report user" title="Report user" style="margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;padding:6px 10px;color:#c62828">🚩</button>
        </div>
        <div class="chat-messages" id="chat-active-messages"></div>
        <div class="chat-input-bar" id="chat-input-bar">
          <input type="file" id="chat-image-input" accept="image/*" style="display:none" onchange="handleChatImageSelect(this)">
          <button class="chat-image-btn" onclick="openChatImagePicker()" aria-label="Send image" title="Send image">📷</button>
          <input type="text" class="chat-input" placeholder="Type a message..." id="chat-input-field">
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>
  <nav class="bottom-nav"><button class="bottom-nav-item" onclick="window.location.href='home.html'"><span>🏠</span><span>Home</span></button><button class="bottom-nav-item" onclick="goToSearch()"><span>🔍</span><span>Search</span></button><button class="bottom-nav-item" onclick="window.location.href='bookings.html'"><span>📅</span><span>Bookings</span></button><button class="bottom-nav-item active" onclick="window.location.href='messages.html'"><span>💬</span><span>Messages</span></button><button class="bottom-nav-item" onclick="window.location.href='profile.html'"><span>👤</span><span>Profile</span></button></nav>
</div>

<div class="toast" id="toast"></div>

<!-- REPORT USER MODAL (shared) -->
<div class="report-modal-overlay" id="report-modal" onclick="if(event.target===this)closeReportModal()">
  <div class="report-modal">
    <div class="report-modal-header">
      <h3 id="report-modal-title">🚩 Report User</h3>
      <button class="report-modal-close" onclick="closeReportModal()" aria-label="Close">×</button>
    </div>
    <p class="report-modal-target" id="report-modal-target">Reporting: —</p>
    <div class="field-group"><label>Category</label><select id="report-modal-category">
      <option>Inappropriate behaviour</option>
      <option>Harassment or abuse</option>
      <option>Scam or fraud</option>
      <option>Unsafe pet care</option>
      <option>No-show / missed booking</option>
      <option>Other</option>
    </select></div>
    <div class="field-group"><label>What happened?</label><textarea id="report-modal-reason" placeholder="Please describe the issue in detail..." rows="5"></textarea></div>
    <div class="report-modal-actions">
      <button class="btn-outline" onclick="closeReportModal()">Cancel</button>
      <button class="btn-primary" onclick="submitReportModal()">Submit Report</button>
    </div>
  </div>
</div>

<!-- Image preview overlay -->
<div class="image-preview-overlay" id="image-preview-overlay" onclick="closeImagePreview()" style="display:none">
  <button class="image-preview-close" onclick="closeImagePreview()">×</button>
  <img id="image-preview-img" class="image-preview-img" src="" alt="Preview">
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-modal-overlay" id="confirm-modal" onclick="if(event.target===this)closeConfirmModal()"><div class="confirm-modal"><div class="confirm-modal-icon" id="confirm-modal-icon">⚠️</div><h3 id="confirm-modal-title">Are you sure?</h3><p id="confirm-modal-message">This action cannot be undone.</p><div class="confirm-modal-actions"><button class="btn-outline" style="color:var(--bark-light);border-color:var(--sand);flex:1;padding:12px" onclick="closeConfirmModal()">Cancel</button><button class="btn-primary" style="flex:1;padding:12px" id="confirm-modal-btn">Confirm</button></div></div></div>

<script src="../app.js"></script>
<script>
(async () => {
  // Re-bind the Enter-to-send handler for the chat input on this page.
  // app.js captures the field once at load time; on this dedicated page
  // the element exists, so attach directly here too for safety.
  const input = document.getElementById('chat-input-field');
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  await loadChatList();

  // Deep-link: ?chat=<id> opens that chat automatically (used after the
  // minder accepts a booking so the chat opens in one click).
  const params = new URLSearchParams(window.location.search);
  const want = Number(params.get('chat'));
  if (want) {
    const exists = chatListCache.find(c => c.id === want);
    if (exists) openChatInline(want);
  }
})();
</script>
</body>
</html>
