<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPal – Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Caveat:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<!-- ADMIN -->
<div class="screen active" id="screen-admin">
  <div class="page-content">
    <div class="admin-hero"><div style="display:flex;align-items:center;justify-content:space-between"><div><h1 style="font-family:'Playfair Display',serif;font-size:24px;color:white">Admin Dashboard</h1><p style="font-size:13px;color:var(--sand);margin-top:4px">🔒 PawPal Administration</p></div><button class="btn-outline" style="padding:8px 16px;font-size:13px" onclick="confirmLogout()">Log Out</button></div></div>
    <div class="admin-tabs"><button class="admin-tab active" onclick="switchAdminTab(this,'admin-users')">👥 Users</button><button class="admin-tab" onclick="switchAdminTab(this,'admin-disputes')">⚠️ Disputes</button></div>
    <div id="admin-users" class="admin-panel" style="display:block"></div>
    <div id="admin-disputes" class="admin-panel" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="confirm-modal-overlay" id="confirm-modal" onclick="if(event.target===this)closeConfirmModal()"><div class="confirm-modal"><div class="confirm-modal-icon" id="confirm-modal-icon">⚠️</div><h3 id="confirm-modal-title">Are you sure?</h3><p id="confirm-modal-message">This action cannot be undone.</p><div class="confirm-modal-actions"><button class="btn-outline" style="color:var(--bark-light);border-color:var(--sand);flex:1;padding:12px" onclick="closeConfirmModal()">Cancel</button><button class="btn-primary" style="flex:1;padding:12px" id="confirm-modal-btn">Confirm</button></div></div></div>

<!-- ADMIN EDIT USER MODAL -->
<div class="pet-modal-overlay" id="admin-edit-modal" onclick="if(event.target===this)closeAdminEditModal()"><div class="pet-modal"><h3 id="admin-edit-title">Edit User</h3><div class="field-group"><label>Name</label><input type="text" id="admin-edit-name"></div><div class="field-group"><label>Email</label><input type="email" id="admin-edit-email"></div><div class="field-group"><label>Role</label><select id="admin-edit-role"><option>Pet Owner</option><option>Pet Minder</option></select></div><div class="field-group"><label>Status</label><select id="admin-edit-status"><option>Active</option><option>Suspended</option><option>Banned</option></select></div><div class="pet-modal-actions"><button class="btn-outline" style="color:var(--bark-light);border-color:var(--sand);flex:1;padding:14px" onclick="closeAdminEditModal()">Cancel</button><button class="btn-primary" style="flex:2;padding:14px" onclick="saveAdminEdit()">Save Changes</button></div></div></div>

<!-- Image preview overlay -->
<div id="image-preview-overlay" onclick="closeImagePreview()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:400;align-items:center;justify-content:center;padding:20px;cursor:zoom-out">
  <button onclick="event.stopPropagation();closeImagePreview()" style="position:absolute;top:16px;left:16px;background:rgba(255,255,255,0.15);color:white;border:none;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
  <img id="image-preview-img" src="" alt="Preview" style="max-width:100%;max-height:100%;border-radius:8px;object-fit:contain">
</div>

<script src="../app.js"></script>

<!-- ADMIN USER DETAIL PANEL -->
<div id="admin-detail-panel" style="
  position:fixed;top:0;right:-420px;width:420px;max-width:95vw;height:100vh;
  background:var(--warm-white);box-shadow:-4px 0 24px rgba(0,0,0,0.12);
  z-index:200;transition:right 0.3s ease;overflow-y:auto;display:flex;flex-direction:column;
" class="admin-detail-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--sand-light);position:sticky;top:0;background:var(--warm-white);z-index:1">
    <span style="font-family:'Playfair Display',serif;font-size:18px;color:var(--bark);font-weight:600">User Details</span>
    <button onclick="closeAdminDetailPanel()" style="background:var(--sand-light);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--bark);display:flex;align-items:center;justify-content:center">✕</button>
  </div>
  <div id="admin-detail-body" style="padding:20px 24px;flex:1"></div>
</div>
<div id="admin-detail-overlay" onclick="closeAdminDetailPanel()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:199"></div>

<style>
.admin-detail-panel.open { right: 0 !important; }
.admin-detail-panel.open + #admin-detail-overlay { display: block !important; }
/* Reuse toggle styles from profile */
.avail-toggle { position:relative; display:inline-block; width:46px; height:26px; flex-shrink:0; }
.avail-toggle input { opacity:0; width:0; height:0; }
.avail-slider { position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:26px;transition:.3s; }
.avail-slider:before { position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s; }
.avail-toggle input:checked + .avail-slider { background:var(--terra,#c0714f); }
.avail-toggle input:checked + .avail-slider:before { transform:translateX(20px); }
</style>

</body>
</html>
