<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPal – Payout Details</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Caveat:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/profile.css">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="screen active" id="screen-payout-page">
  <div class="page-content">
    <div class="profile-sub-header" style="padding:20px 24px 0">
      <button class="back-btn" style="position:static;background:var(--sand-light);color:var(--bark);margin-bottom:16px" onclick="window.location.href='profile.html'">←</button>
      <h1 style="font-family:'Playfair Display',serif;font-size:22px;color:var(--bark);margin-bottom:6px">💷 Payout Details</h1>
      <p style="font-size:13px;color:var(--bark-light);margin-bottom:20px">Where earnings from completed bookings are sent. <em>Demo only — details are stored safely and shown masked.</em></p>
    </div>

    <div style="padding:0 24px 32px">
      <div id="payout-saved-card" style="display:none;background:white;border-radius:var(--radius);padding:18px;box-shadow:0 2px 12px var(--shadow);margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-weight:600;font-size:14px;color:var(--bark)">Current payout method</span>
          <span style="font-size:11px;color:var(--moss);background:var(--sand-light);padding:3px 8px;border-radius:10px">✓ Saved</span>
        </div>
        <div id="payout-saved-body" style="font-size:13px;color:var(--bark-light);line-height:1.7"></div>
      </div>

      <div style="background:white;border-radius:var(--radius);padding:20px;box-shadow:0 2px 12px var(--shadow)">
        <p style="font-size:14px;font-weight:600;color:var(--bark);margin-bottom:12px" id="payout-form-title">Add payout details</p>
        <div class="field-group"><label>Account holder name</label><input type="text" id="payout-name-input" placeholder="Name on bank account"></div>
        <div class="field-group"><label>Bank name</label><input type="text" id="payout-bank-input" placeholder="e.g. Barclays"></div>
        <div class="field-group"><label>Sort code</label><input type="text" id="payout-sort-input" inputmode="numeric" placeholder="123456" maxlength="8"></div>
        <div class="field-group"><label>Account number</label><input type="text" id="payout-account-input" inputmode="numeric" placeholder="12345678" maxlength="8"></div>
        <div id="payout-error" style="display:none;color:#c62828;font-size:13px;margin-bottom:10px"></div>
        <button class="btn-primary" style="width:100%;padding:14px" onclick="savePayoutDetails()">Save Payout Details</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/config.js"></script>
<script src="../app.js"></script>
<script>
(async () => {
  try {
    const me = await api.getMe();
    hydrateUserProfile(me);
    const roles = Array.isArray(me.role) ? me.role : [me.role || ''];
    if (!roles.includes('minder')) {
      showToast('❌ Payout details are only available for minders');
      setTimeout(() => { window.location.href = 'profile.html'; }, 800);
      return;
    }
  } catch {
    window.location.href = 'auth.html';
    return;
  }
  loadPayoutDetails();
})();
</script>
</body>
</html>
