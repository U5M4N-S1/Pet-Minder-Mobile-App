<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPal – Pet Minder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Caveat:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="screen active" id="screen-landing">
  <div class="landing-blob blob1"></div>
  <div class="landing-blob blob2"></div>
  <div class="landing-inner">
    <div class="landing-logo-block"><span class="landing-logo-paw">Paw</span><span class="landing-logo-pal">Pal</span> <span style="font-size:42px;margin-left:4px">🐾</span></div>
    <h1 class="landing-title">Your pet,<br><span>loved & safe.</span></h1>
    <p class="landing-sub">Find trusted, local pet minders who care as much as you do.</p>
    <div class="landing-trust">
      <div class="trust-item"><span class="trust-num">2.4k</span><span class="trust-label">Minders</span></div>
      <div class="trust-item"><span class="trust-num">★4.9</span><span class="trust-label">Avg Rating</span></div>
      <div class="trust-item"><span class="trust-num">12k</span><span class="trust-label">Bookings</span></div>
    </div>
    <div class="landing-cta">
      <button class="btn-primary" style="padding:18px 40px;font-size:17px" onclick="window.location.href='pages/auth.html'">Register Today or Log In 🐾</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
